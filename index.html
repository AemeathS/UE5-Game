            playerState.isAttacking = true;

            setTimeout(() => {
                const backstabDamage = 80;
                enemy.userData.currentHP -= backstabDamage;

                createBackstabEffect(enemy.position);

                if (enemy.userData.currentHP <= 0) {
                    enemyDie(enemy);
                }

                playerState.isAttacking = false;
            }, 300);
        }

        /**
         * 创建处决特效
         */
        function createExecutionEffect(position) {
            const particleCount = 30;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = position.x + (Math.random() - 0.5) * 0.5;
                positions[i * 3 + 1] = position.y + 1 + Math.random() * 0.5;
                positions[i * 3 + 2] = position.z + (Math.random() - 0.5) * 0.5;

                colors[i * 3] = 1.0;
                colors[i * 3 + 1] = 0.5;
                colors[i * 3 + 2] = 0.0;

                velocities.push({
                    x: (Math.random() - 0.5) * 3,
                    y: Math.random() * 2 + 1,
                    z: (Math.random() - 0.5) * 3
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            attackEffects.push({
                particles: particles,
                velocities: velocities,
                life: 0.8
            });

            triggerScreenShake(0.15);
        }

        /**
         * 创建背刺特效
         */
        function createBackstabEffect(position) {
            const particleCount = 20;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = position.x + (Math.random() - 0.5) * 0.5;
                positions[i * 3 + 1] = position.y + 1.5;
                positions[i * 3 + 2] = position.z + (Math.random() - 0.5) * 0.5;

                colors[i * 3] = 0.8;
                colors[i * 3 + 1] = 0.1;
                colors[i * 3 + 2] = 0.8;

                velocities.push({

        // ==================== 迷雾粒子系统 ====================

        /**
         * 创建迷雾粒子系统
         * 限制视野范围，增强未知恐惧感
         */
        function createMistSystem() {
            // 性能优化：减少粒子数量
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const opacities = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 60;
                positions[i * 3 + 1] = Math.random() * 10 + 0.5;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 60;
                sizes[i] = Math.random() * 4 + 2;
                opacities[i] = Math.random() * 0.25 + 0.05;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    fogColor: { value: new THREE.Color(0x0a0a0a) },
                    fogNear: { value: 5 },
                    fogFar: { value: 40 }
                },
                vertexShader: `
                    attribute float size;
                    attribute float opacity;
                    varying float vOpacity;
                    void main() {
                        vOpacity = opacity;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying float vOpacity;
                    void main() {
                        vec2 center = gl_PointCoord - vec2(0.5);
                        float dist = length(center);
                        if (dist > 0.5) discard;
                        float alpha = (1.0 - dist * 2.0) * vOpacity;
                        gl_FragColor = vec4(0.2, 0.2, 0.2, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const mistParticles = new THREE.Points(geometry, material);
            mistParticles.userData = { isMist: true, velocities: [] };
            
            // 初始化粒子速度
            for (let i = 0; i < particleCount; i++) {
                mistParticles.userData.velocities.push({
                    x: (Math.random() - 0.5) * 0.02,
                    y: Math.random() * 0.01 + 0.005,
                    z: (Math.random() - 0.5) * 0.02
                });
            }

            scene.add(mistParticles);
        }

        /**
         * 创建篝火火焰粒子系统
         */
        function createBonfireFlames() {
            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            const opacities = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                resetFireParticle(i, positions, colors, sizes, opacities);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));

            const material = new THREE.ShaderMaterial({
                vertexShader: `
                    attribute float size;
                    attribute float opacity;
                    attribute vec3 color;
                    varying vec3 vColor;
                    varying float vOpacity;
                    void main() {
                        vColor = color;
                        vOpacity = opacity;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vOpacity;
                    void main() {
                        vec2 center = gl_PointCoord - vec2(0.5);
                        float dist = length(center);
                        if (dist > 0.5) discard;
                        float alpha = (1.0 - dist * 2.0) * vOpacity;
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                vertexColors: true
            });

            const fireParticles = new THREE.Points(geometry, material);
            fireParticles.position.set(0, 0.5, 20);
            fireParticles.userData = { 
                isFire: true, 
                particleCount: particleCount,
                resetParticle: resetFireParticle
            };

            scene.add(fireParticles);
        }

        /**
         * 重置火焰粒子
         */
        function resetFireParticle(index, positions, colors, sizes, opacities) {
            const baseX = (Math.random() - 0.5) * 0.5;
            const baseZ = (Math.random() - 0.5) * 0.5;
            
            positions[index * 3] = baseX;
            positions[index * 3 + 1] = 0;
            positions[index * 3 + 2] = baseZ;

            const colorChoice = Math.random();
            if (colorChoice < 0.3) {
                colors[index * 3] = 1.0;
                colors[index * 3 + 1] = 0.2;
                colors[index * 3 + 2] = 0.0;
            } else if (colorChoice < 0.6) {
                colors[index * 3] = 1.0;
                colors[index * 3 + 1] = 0.5;
                colors[index * 3 + 2] = 0.1;
            } else {
                colors[index * 3] = 1.0;
                colors[index * 3 + 1] = 0.8;
                colors[index * 3 + 2] = 0.3;
            }

            sizes[index] = Math.random() * 0.8 + 0.3;
            opacities[index] = Math.random() * 0.5 + 0.5;
        }

        /**
         * 更新粒子系统
         */
        function updateParticles(deltaTime) {
            updateMistParticles(deltaTime);
            updateFireParticles(deltaTime);
        }

        /**
         * 更新迷雾粒子
         */
        function updateMistParticles(deltaTime) {
            scene.children.forEach(child => {
                if (child.type === 'Points' && child.userData.isMist) {
                    const positions = child.geometry.attributes.position.array;
                    const velocities = child.userData.velocities;
                    const particleCount = velocities.length;

                    for (let i = 0; i < particleCount; i++) {
                        positions[i * 3] += velocities[i].x;
                        positions[i * 3 + 1] += velocities[i].y;
                        positions[i * 3 + 2] += velocities[i].z;

                        // 边界检查和重置
                        if (positions[i * 3] > 50) positions[i * 3] = -50;
                        if (positions[i * 3] < -50) positions[i * 3] = 50;
                        if (positions[i * 3 + 1] > 15) positions[i * 3 + 1] = 0.5;
                        if (positions[i * 3 + 2] > 50) positions[i * 3 + 2] = -50;
                        if (positions[i * 3 + 2] < -50) positions[i * 3 + 2] = 50;
                    }

                    child.geometry.attributes.position.needsUpdate = true;
                }
            });
        }

        /**
         * 更新火焰粒子
         */
        function updateFireParticles(deltaTime) {
            scene.children.forEach(child => {
                if (child.type === 'Points' && child.userData.isFire) {
                    const positions = child.geometry.attributes.position.array;
                    const opacities = child.geometry.attributes.opacity.array;
                    const sizes = child.geometry.attributes.size.array;
                    const particleCount = child.userData.particleCount;
                    const resetParticle = child.userData.resetParticle;

                    for (let i = 0; i < particleCount; i++) {
                        // 上升
                        positions[i * 3 + 1] += deltaTime * (2 + Math.random() * 2);
                        
                        // 左右摇摆
                        positions[i * 3] += Math.sin(Date.now() * 0.01 + i) * 0.01;
                        positions[i * 3 + 2] += Math.cos(Date.now() * 0.01 + i) * 0.01;

                        // 渐隐
                        opacities[i] -= deltaTime * 2;
                        
                        // 缩小
                        sizes[i] *= (1 - deltaTime * 0.5);

                        // 重置粒子
                        if (opacities[i] <= 0 || positions[i * 3 + 1] > 3) {
                            resetParticle(i, positions, child.geometry.attributes.color.array, sizes, opacities);
                        }
                    }

                    child.geometry.attributes.position.needsUpdate = true;
                    child.geometry.attributes.opacity.needsUpdate = true;
                    child.geometry.attributes.size.needsUpdate = true;
                }
            });
        }

        /**
         * 设置事件监听
         */
        function setupEventListeners() {
            // 窗口大小改变
            window.addEventListener('resize', onWindowResize);

            // 键盘按下
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                
                // 防止页面滚动
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Tab'].includes(e.code)) {
                    e.preventDefault();
                }

                // 武器切换
                if (e.code === 'Digit1') {
                    currentWeaponIndex = 0;
                    updateWeaponUI();
                }
                if (e.code === 'Digit2') {
                    currentWeaponIndex = 1;
                    updateWeaponUI();
                }
                if (e.code === 'Digit3') {
                    currentWeaponIndex = 2;
                    updateWeaponUI();
                }

                // 使用生命瓶（R键）
                if (e.code === 'KeyR') {
                    useConsumable('estusFlask');
                }

                // 使用体力瓶（F键）
                if (e.code === 'KeyF') {
                    useConsumable('staminaFlask');
                }

                // 装备界面（Tab键）
                if (e.code === 'Tab') {
                    toggleEquipment();
                }
            });

            // 键盘松开
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            // 鼠标移动
            window.addEventListener('mousemove', (e) => {
                mouse.dx = e.movementX;
                mouse.dy = e.movementY;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            // 鼠标按下
            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) mouse.left = true;
                if (e.button === 1) mouse.middle = true;
                if (e.button === 2) mouse.right = true;
                
                // 点击游戏区域时锁定鼠标
                if (e.target === renderer.domElement) {
                    renderer.domElement.requestPointerLock();
                }
            });

            // 鼠标松开
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) mouse.left = false;
                if (e.button === 1) mouse.middle = false;
                if (e.button === 2) mouse.right = false;
            });

            // 鼠标滚轮
            window.addEventListener('wheel', (e) => {
                // 可以用于缩放或切换武器
                e.preventDefault();
            });

            // 指针锁定改变
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === renderer.domElement) {
                    // 鼠标已锁定
                } else {
                    // 鼠标已解锁
                }
            });
        }

        /**
         * 窗口大小改变处理
         */
        function onWindowResize() {
            sceneWidth = window.innerWidth;
            sceneHeight = window.innerHeight;

            camera.aspect = sceneWidth / sceneHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(sceneWidth, sceneHeight);
        }

        // ==================== 游戏循环 ====================

        /**
         * 游戏主循环
         */
        function gameLoop(currentTime) {
            if (!isGameRunning) return;

            requestAnimationFrame(gameLoop);

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // 更新FPS计数器
            frameCount++;
            if (frameCount % 10 === 0) {
                fps = Math.round(1 / deltaTime);
                document.getElementById('fps-counter').textContent = `FPS: ${fps}`;
            }

            // 更新游戏逻辑
            update(deltaTime);

            // 渲染场景
            render();

            // 重置鼠标增量
            mouse.dx = 0;
            mouse.dy = 0;
        }

        /**
         * 更新游戏逻辑
         * @param {number} deltaTime - 时间增量（秒）
         */
        function update(deltaTime) {
            // 更新火把摇曳效果
            updateTorchFlickering(deltaTime);

            // 更新粒子系统
            updateParticles(deltaTime);

            // 更新玩家属性
            updatePlayerAttributes(deltaTime);

            // 更新锁定系统
            updateLockOn();

            // 更新格挡系统
            updateBlocking(deltaTime);

            // 更新战斗系统
            updateCombat(deltaTime);

            // 更新战斗碰撞检测
            updateCombatCollision();

            // 更新敌人AI
            updateEnemies(deltaTime);

            // 更新玩家移动
            updatePlayerMovement(deltaTime);

            // 拾取灵魂
            pickupSouls();

            // 非锁定状态下鼠标控制视角
            if (!isLockedOn) {
                const lookSpeed = 0.002;
                camera.rotation.y -= mouse.dx * lookSpeed;
                camera.rotation.x -= mouse.dy * lookSpeed;
                
                // 限制垂直视角
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }

            // 更新相机位置（跟随玩家）
            updateCameraPosition();
        }

        /**
         * 更新火把摇曳动画
         * 火把光源强度和位置会随时间随机变化，营造真实的火焰效果
         */
        function updateTorchFlickering(deltaTime) {
            const time = Date.now() * 0.001;
            
            scene.children.forEach(child => {
                if (child.type === 'PointLight' && child.userData.isTorch) {
                    // 火焰强度随机波动
                    const flicker = Math.sin(time * 15 + child.id) * 0.3 + 
                                    Math.sin(time * 23 + child.id * 0.7) * 0.2;
                    child.intensity = child.userData.baseIntensity * (1 + flicker);

                    // 火焰位置轻微抖动
                    child.position.y += (Math.random() - 0.5) * 0.02;
                    child.position.x += (Math.random() - 0.5) * 0.01;
                    child.position.z += (Math.random() - 0.5) * 0.01;
                }
            });
        }

        /**

         */
        function triggerScreenShake(intensity) {
            const container = document.getElementById('game-container');
            const originalTransform = container.style.transform;
            
            container.style.transition = 'transform 0.1s';
            container.style.transform = `translate(${Math.random() * intensity * 2 - intensity}px, ${Math.random() * intensity * 2 - intensity}px)`;
            
            setTimeout(() => {
                container.style.transform = originalTransform;
            }, 100);
        }

                bottom: 20px;
                left: 20px;
                color: #888;
                font-size: 14px;
            `;
            weaponDiv.innerHTML = '<div>当前武器: 直剑</div><div>R: 生命瓶 x3 | F: 体力瓶 x2</div>';
            uiContainer.appendChild(weaponDiv);

            document.getElementById('game-container').appendChild(uiContainer);
        }

        /**
         * 更新武器UI显示
         */
        function updateWeaponUI() {
            const weaponDisplay = document.getElementById('weapon-display');
            if (weaponDisplay) {
                const weapon = weapons[currentWeaponIndex];
                weaponDisplay.innerHTML = `
                    <div>当前武器: ${weapon.name}</div>
                    <div>R: 生命瓶 x${consumables.estusFlask.count} | F: 体力瓶 x${consumables.staminaFlask.count}</div>
                `;
            }
        }

        /**
         * 更新消耗品UI显示
         */
        function updateConsumableUI() {
            const weaponDisplay = document.getElementById('weapon-display');
            if (weaponDisplay) {
                const weapon = weapons[currentWeaponIndex];
                weaponDisplay.innerHTML = `
                    <div>当前武器: ${weapon.name}</div>
                    <div>R: 生命瓶 x${consumables.estusFlask.count} | F: 体力瓶 x${consumables.staminaFlask.count}</div>
                `;
            }
        }

        /**
         * 创建状态条
         */
        function createStatusBar(label, color) {
            const container = document.createElement('div');
            container.style.cssText = `
                margin-bottom: 10px;
            `;

            const labelDiv = document.createElement('div');
            labelDiv.textContent = label;
            labelDiv.style.cssText = `
                color: #888;
                font-size: 12px;
                margin-bottom: 3px;
            `;

            const barBackground = document.createElement('div');
            barBackground.style.cssText = `
                width: 100%;
                height: 8px;
                background: #1a1a1a;
                border-radius: 4px;
                overflow: hidden;
            `;

            const barFill = document.createElement('div');
            barFill.id = `${label.toLowerCase()}-bar`;
            barFill.style.cssText = `
                width: 100%;
                height: 100%;
                background: ${color};
                transition: width 0.2s;
            `;

            barBackground.appendChild(barFill);
            container.appendChild(labelDiv);
            container.appendChild(barBackground);

            return container;
        }

        /**
         * 更新UI显示
         */
        function updateUI() {
            // 更新HP条
            const hpBar = document.getElementById('hp-bar');
            if (hpBar) {
                const hpPercent = (playerAttributes.currentHP / playerAttributes.maxHP) * 100;
                hpBar.style.width = `${Math.max(0, hpPercent)}%`;
            }

            // 更新Stamina条
            const staminaBar = document.getElementById('stamina-bar');
            if (staminaBar) {
                const staminaPercent = (playerAttributes.currentStamina / playerAttributes.maxStamina) * 100;
                staminaBar.style.width = `${Math.max(0, staminaPercent)}%`;
            }

            // 更新FP条
            const fpBar = document.getElementById('fp-bar');
            if (fpBar) {
                const fpPercent = (playerAttributes.currentFP / playerAttributes.maxFP) * 100;
                fpBar.style.width = `${Math.max(0, fpPercent)}%`;
            }

            // 更新灵魂数量
            const soulsDisplay = document.getElementById('souls-display');
            if (soulsDisplay) {
                soulsDisplay.textContent = `SOULS: ${playerAttributes.souls}`;
            }
        }

        /**
         * 渲染场景
         */
        function render() {
            renderer.render(scene, camera);
            updateUI();
        }

        // ==================== 音频系统 ====================

        /**
         * 初始化音频系统
         */
        function initAudioSystem() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                startAmbientAudio();
            } catch (e) {
                console.warn('Web Audio API not supported');
            }
        }

        /**
         * 启动环境音效
         */
        function startAmbientAudio() {
            if (!audioContext) return;

            // 风声
            createWindSound();

            // 火把燃烧声
            createTorchSound();

            // 氛围背景音乐
            createAmbientMusic();
        }

        /**
         * 创建风声
         */
        function createWindSound() {
            const bufferSize = audioContext.sampleRate * 2;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.3;
            }

            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            const gain = audioContext.createGain();
            gain.gain.value = 0.08;

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);

            noise.start();
            ambientAudioNodes.push({ noise, filter, gain });

            // 动态调整风声
            setInterval(() => {
                filter.frequency.value = 300 + Math.random() * 200;
                gain.gain.value = 0.05 + Math.random() * 0.05;
            }, 2000);
        }

        /**
         * 创建火把燃烧声
         */
        function createTorchSound() {
            const bufferSize = audioContext.sampleRate * 1;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.5;
            }

            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.5;

            const gain = audioContext.createGain();
            gain.gain.value = 0.05;

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);

            noise.start();
            ambientAudioNodes.push({ noise, filter, gain });

            // 燃烧声波动
            setInterval(() => {
                filter.frequency.value = 700 + Math.random() * 200;
                gain.gain.value = 0.03 + Math.random() * 0.04;
            }, 300);
        }

        /**
         * 创建氛围背景音乐（低沉弦乐）
         */
        function createAmbientMusic() {
            const notes = [65.41, 73.42, 82.41, 98.00, 110.00];
            let noteIndex = 0;

            function playNote() {
                if (!audioContext || audioContext.state === 'suspended') return;

                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();

                oscillator.type = 'triangle';
                oscillator.frequency.value = notes[noteIndex] / 2;

                gain.gain.setValueAtTime(0, audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(0.02, audioContext.currentTime + 2);
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 8);

                oscillator.connect(gain);
                gain.connect(audioContext.destination);

                oscillator.start();
                oscillator.stop(audioContext.currentTime + 8);

                noteIndex = (noteIndex + 1) % notes.length;
            }

            playNote();
            setInterval(playNote, 6000);
        }

        /**
         * 播放战斗音效
         * @param {string} type - 音效类型 ('sword', 'block', 'roll', 'hit')
         */
        function playCombatSound(type) {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();

            switch (type) {
                case 'sword':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.15, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    break;

                case 'block':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    break;

                case 'roll':
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.08, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.12);
                    break;

                case 'hit':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.12, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    break;
            }

            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        /**
         * 播放拾取音效
         */
        function playPickupSound() {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.1);

            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        /**
         * 播放死亡音效
         */
        function playDeathSound() {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 2);

            gain.gain.setValueAtTime(0.15, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);

            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 2);
        }

        // ==================== 启动游戏 ====================

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            init();
            createUI();
        });

    </script>
